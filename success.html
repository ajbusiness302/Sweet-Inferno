<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sweet Inferno — Order Received</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #080608;
    color: #f5e6c8;
    font-family: 'EB Garamond', serif;
    min-height: 100svh;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 2rem;
  }
  .wrap { max-width: 480px; }
  .flame { font-size: 2.5rem; margin-bottom: 1.5rem; }
  h1 {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(1.4rem, 4vw, 2rem);
    color: #c9a84c;
    margin-bottom: 1rem;
    text-shadow: 0 0 30px rgba(201,168,76,0.4);
  }
  p {
    font-style: italic;
    color: rgba(245,230,200,0.7);
    font-size: 1.1rem;
    line-height: 1.8;
    margin-bottom: 1rem;
  }
  .divider {
    color: #7a5f2a;
    letter-spacing: 0.5em;
    margin: 2rem 0;
    opacity: 0.5;
  }
  a {
    font-family: 'Cinzel', serif;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: #080608;
    background: linear-gradient(135deg, #c9a84c, #e8c96d, #c9a84c);
    padding: 0.8rem 2rem;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s;
  }
  a:hover { box-shadow: 0 0 30px rgba(201,168,76,0.5); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="flame">🕯️</div>
    <h1>The gate received you.</h1>
    <p>Your order is confirmed. Sweet is already at work.</p>
    <p>Watch for a text with your pickup details — your cubby assignment and window will arrive closer to the last weekend of the month.</p>
    <div class="divider">· · ·</div>
    <a href="/">Return to the Inferno</a>
  </div>
</body>
</html>
